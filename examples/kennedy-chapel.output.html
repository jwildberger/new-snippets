<html lang="en">
  <head>
    <META http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Kennedy Chapel Photo Carousel Table Example</title>
    <link rel="stylesheet" href="../assets/css/photo-carousel.css">
    <script src="../assets/js/photo-carousel.js" defer></script>
  </head>
  <body>
    <div class="col-12 uwg-content">
      <h2>Ceremony</h2>
      <section class="uwg-c-photo-carousel" data-uwg-photo-carousel="" aria-roledescription="carousel" aria-label="Kennedy Chapel photo gallery"><div class="uwg-c-photo-carousel__viewport">
          <ol class="uwg-c-photo-carousel__slides">
            <li class="uwg-c-photo-carousel__slide" data-uwg-photo-carousel-slide="" aria-hidden="false"><figure class="uwg-c-photo-carousel__figure"><img src="/assets/kennedy-chapel/pics/sc_lunch_1.jpg" alt="Robert Kennedy and others posing for a picture" class="uwg-c-photo-carousel__image"><figcaption class="uwg-c-photo-carousel__caption">Robert Kennedy and others posing for a picture.</figcaption></figure></li>
            <li class="uwg-c-photo-carousel__slide" data-uwg-photo-carousel-slide="" aria-hidden="true" hidden="hidden"><figure class="uwg-c-photo-carousel__figure"><img src="/assets/kennedy-chapel/pics/sc_lunch_2.jpg" alt="Robert Kennedy being introduced to another man by Dr. Boyd" loading="lazy" class="uwg-c-photo-carousel__image"><figcaption class="uwg-c-photo-carousel__caption">Robert Kennedy being introduced to another man by Dr. Boyd.</figcaption></figure></li>
            <li class="uwg-c-photo-carousel__slide" data-uwg-photo-carousel-slide="" aria-hidden="true" hidden="hidden"><figure class="uwg-c-photo-carousel__figure"><img src="/assets/kennedy-chapel/pics/sc_lunch_3.jpg" alt="Ethel Kennedy speaking to others" loading="lazy" class="uwg-c-photo-carousel__image"><figcaption class="uwg-c-photo-carousel__caption">Ethel Kennedy speaking to others.</figcaption></figure></li>
            <li class="uwg-c-photo-carousel__slide" data-uwg-photo-carousel-slide="" aria-hidden="true" hidden="hidden"><figure class="uwg-c-photo-carousel__figure"><img src="/assets/kennedy-chapel/pics/sc_lunch_4.jpg" alt="Robert Kennedy signing an autograph for a man" loading="lazy" class="uwg-c-photo-carousel__image"><figcaption class="uwg-c-photo-carousel__caption">Robert Kennedy signing an autograph for a man.</figcaption></figure></li>
            <li class="uwg-c-photo-carousel__slide" data-uwg-photo-carousel-slide="" aria-hidden="true" hidden="hidden"><figure class="uwg-c-photo-carousel__figure"><img src="/assets/kennedy-chapel/pics/sc_lunch_5.pdf.jpg" alt="Robert Kennedy speaking with Dr. Boyd" loading="lazy" class="uwg-c-photo-carousel__image"><figcaption class="uwg-c-photo-carousel__caption">Robert Kennedy speaking with Dr. Boyd.</figcaption></figure></li>
            <li class="uwg-c-photo-carousel__slide" data-uwg-photo-carousel-slide="" aria-hidden="true" hidden="hidden"><figure class="uwg-c-photo-carousel__figure"><img src="/assets/kennedy-chapel/pics/sc_lunch_6.jpg" alt="Ethel Kennedy reading The Atlanta Constitution at lunch" loading="lazy" class="uwg-c-photo-carousel__image"><figcaption class="uwg-c-photo-carousel__caption">Ethel Kennedy reading <em>The Atlanta Constitution</em> at lunch.</figcaption></figure></li>
            <li class="uwg-c-photo-carousel__slide" data-uwg-photo-carousel-slide="" aria-hidden="true" hidden="hidden"><figure class="uwg-c-photo-carousel__figure"><img src="/assets/kennedy-chapel/pics/ahc_questions_2.jpg" alt="Robert Kennedy standing before the university's student body" loading="lazy" class="uwg-c-photo-carousel__image"><figcaption class="uwg-c-photo-carousel__caption">Robert Kennedy standing before the university's student body.</figcaption></figure></li>
            <li class="uwg-c-photo-carousel__slide" data-uwg-photo-carousel-slide="" aria-hidden="true" hidden="hidden"><figure class="uwg-c-photo-carousel__figure"><img src="/assets/kennedy-chapel/pics/ahc_questions_1.jpg" alt="A student asking Robert Kennedy a question" loading="lazy" class="uwg-c-photo-carousel__image"><figcaption class="uwg-c-photo-carousel__caption">A student asking Robert Kennedy a question.</figcaption></figure></li>
          </ol>
        </div>
        <div class="uwg-c-photo-carousel__controls"><button class="uwg-c-photo-carousel__button" type="button" data-uwg-photo-carousel-prev=""><span aria-hidden="true">&lt;</span><span class="uwg-c-photo-carousel__sr-only">Previous slide</span></button><p class="uwg-c-photo-carousel__status" data-uwg-photo-carousel-status="" aria-live="polite" aria-atomic="true">Slide 1 of 8</p><button class="uwg-c-photo-carousel__button" type="button" data-uwg-photo-carousel-next=""><span aria-hidden="true">&gt;</span><span class="uwg-c-photo-carousel__sr-only">Next slide</span></button></div>
        <div class="uwg-c-photo-carousel__dots" role="group" aria-label="Choose slide"><button type="button" data-uwg-photo-carousel-dot="" aria-label="Show slide 1" aria-current="true"></button><button type="button" data-uwg-photo-carousel-dot="" aria-label="Show slide 2"></button><button type="button" data-uwg-photo-carousel-dot="" aria-label="Show slide 3"></button><button type="button" data-uwg-photo-carousel-dot="" aria-label="Show slide 4"></button><button type="button" data-uwg-photo-carousel-dot="" aria-label="Show slide 5"></button><button type="button" data-uwg-photo-carousel-dot="" aria-label="Show slide 6"></button><button type="button" data-uwg-photo-carousel-dot="" aria-label="Show slide 7"></button><button type="button" data-uwg-photo-carousel-dot="" aria-label="Show slide 8"></button></div></section>
      

      <h2>Lunch and open forum</h2>
      <section class="uwg-c-photo-carousel" data-uwg-photo-carousel="" aria-roledescription="carousel" aria-label="Kennedy Chapel dedication ceremony photo gallery"><div class="uwg-c-photo-carousel__viewport">
          <ol class="uwg-c-photo-carousel__slides">
            <li class="uwg-c-photo-carousel__slide" data-uwg-photo-carousel-slide="" aria-hidden="false"><figure class="uwg-c-photo-carousel__figure"><img src="/assets/kennedy-chapel/pics/ahc_ceremony_7.jpg" alt="Robert Kennedy reciting his speech at the dedication ceremony" class="uwg-c-photo-carousel__image"><figcaption class="uwg-c-photo-carousel__caption">Robert Kennedy reciting his speech at the dedication ceremony.</figcaption></figure></li>
            <li class="uwg-c-photo-carousel__slide" data-uwg-photo-carousel-slide="" aria-hidden="true" hidden="hidden"><figure class="uwg-c-photo-carousel__figure"><img src="/assets/kennedy-chapel/pics/ahc_ceremony_4.jpg" alt="Kennedy and campus faculty at the dedication ceremony" loading="lazy" class="uwg-c-photo-carousel__image"><figcaption class="uwg-c-photo-carousel__caption">Kennedy and campus faculty at the dedication ceremony.</figcaption></figure></li>
            <li class="uwg-c-photo-carousel__slide" data-uwg-photo-carousel-slide="" aria-hidden="true" hidden="hidden"><figure class="uwg-c-photo-carousel__figure"><img src="/assets/kennedy-chapel/pics/ahc_ceremony_1.jpg" alt="The West Georgia College Choir and press at the dedication ceremony" loading="lazy" class="uwg-c-photo-carousel__image"><figcaption class="uwg-c-photo-carousel__caption">The West Georgia College Choir and press at the dedication ceremony.</figcaption></figure></li>
            <li class="uwg-c-photo-carousel__slide" data-uwg-photo-carousel-slide="" aria-hidden="true" hidden="hidden"><figure class="uwg-c-photo-carousel__figure"><img src="/assets/kennedy-chapel/pics/ahc_ceremony_2.jpg" alt="A view of the crowd at the dedication ceremony" loading="lazy" class="uwg-c-photo-carousel__image"><figcaption class="uwg-c-photo-carousel__caption">A view of the crowd at the dedication ceremony.</figcaption></figure></li>
            <li class="uwg-c-photo-carousel__slide" data-uwg-photo-carousel-slide="" aria-hidden="true" hidden="hidden"><figure class="uwg-c-photo-carousel__figure"><img src="/assets/kennedy-chapel/pics/ahc_ceremony_3.jpg" alt="A view of the crowd at the dedication ceremony" loading="lazy" class="uwg-c-photo-carousel__image"><figcaption class="uwg-c-photo-carousel__caption">A view of the crowd at the dedication ceremony.</figcaption></figure></li>
            <li class="uwg-c-photo-carousel__slide" data-uwg-photo-carousel-slide="" aria-hidden="true" hidden="hidden"><figure class="uwg-c-photo-carousel__figure"><img src="/assets/kennedy-chapel/pics/ahc_ceremony_5.jpg" alt="Robert Kennedy and Dr. Boyd preparing for the ceremonial groundbreaking" loading="lazy" class="uwg-c-photo-carousel__image"><figcaption class="uwg-c-photo-carousel__caption">Robert Kennedy and Dr. Boyd preparing for the ceremonial groundbreaking.</figcaption></figure></li>
            <li class="uwg-c-photo-carousel__slide" data-uwg-photo-carousel-slide="" aria-hidden="true" hidden="hidden"><figure class="uwg-c-photo-carousel__figure"><img src="/assets/kennedy-chapel/pics/ahc_ceremony_8.jpg" alt="Robert Kennedy caught in the crowd at the dedication ceremony" loading="lazy" class="uwg-c-photo-carousel__image"><figcaption class="uwg-c-photo-carousel__caption">Robert Kennedy caught in the crowd at the dedication ceremony.</figcaption></figure></li>
          </ol>
        </div>
        <div class="uwg-c-photo-carousel__controls"><button class="uwg-c-photo-carousel__button" type="button" data-uwg-photo-carousel-prev=""><span aria-hidden="true">&lt;</span><span class="uwg-c-photo-carousel__sr-only">Previous slide</span></button><p class="uwg-c-photo-carousel__status" data-uwg-photo-carousel-status="" aria-live="polite" aria-atomic="true">Slide 1 of 7</p><button class="uwg-c-photo-carousel__button" type="button" data-uwg-photo-carousel-next=""><span aria-hidden="true">&gt;</span><span class="uwg-c-photo-carousel__sr-only">Next slide</span></button></div>
        <div class="uwg-c-photo-carousel__dots" role="group" aria-label="Choose slide"><button type="button" data-uwg-photo-carousel-dot="" aria-label="Show slide 1" aria-current="true"></button><button type="button" data-uwg-photo-carousel-dot="" aria-label="Show slide 2"></button><button type="button" data-uwg-photo-carousel-dot="" aria-label="Show slide 3"></button><button type="button" data-uwg-photo-carousel-dot="" aria-label="Show slide 4"></button><button type="button" data-uwg-photo-carousel-dot="" aria-label="Show slide 5"></button><button type="button" data-uwg-photo-carousel-dot="" aria-label="Show slide 6"></button><button type="button" data-uwg-photo-carousel-dot="" aria-label="Show slide 7"></button></div></section>
      
    </div>
  </body>
</html>
