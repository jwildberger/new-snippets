<html lang="en">
  <head>
    <META http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Photo Carousel Snippet Table Example</title>
    <link rel="stylesheet" href="../assets/css/photo-carousel.css">
    <script src="../assets/js/photo-carousel.js" defer></script>
  </head>
  <body>
    <h1>Photo Carousel Snippet Table Example</h1>
    <section class="uwg-c-photo-carousel" data-uwg-photo-carousel="" role="region" aria-label="Campus scenes photo gallery"><div class="uwg-c-photo-carousel__viewport">
        <ol class="uwg-c-photo-carousel__slides">
          <li class="uwg-c-photo-carousel__slide" data-uwg-photo-carousel-slide="" aria-hidden="false"><figure class="uwg-c-photo-carousel__figure"><img src="images/campus-green.svg" alt="Students walking across a green campus lawn" width="1200" height="675" class="uwg-c-photo-carousel__image"><figcaption class="uwg-c-photo-carousel__caption">
            <p>Students cross the campus green between morning classes.</p>
          </figcaption></figure></li>
          <li class="uwg-c-photo-carousel__slide" data-uwg-photo-carousel-slide="" aria-hidden="true" hidden="hidden"><figure class="uwg-c-photo-carousel__figure"><img src="images/library-steps.svg" alt="A campus library entrance with broad steps and banners" width="1200" height="675" class="uwg-c-photo-carousel__image"><figcaption class="uwg-c-photo-carousel__caption">
            <p>The library entrance provides a central meeting place for study groups.</p>
          </figcaption></figure></li>
          <li class="uwg-c-photo-carousel__slide" data-uwg-photo-carousel-slide="" aria-hidden="true" hidden="hidden"><figure class="uwg-c-photo-carousel__figure"><img src="images/student-center.svg" alt="Students gathered outside a bright student center" width="1200" height="675" class="uwg-c-photo-carousel__image"><figcaption class="uwg-c-photo-carousel__caption">
            <p>The <strong>student center</strong> hosts events, dining, and organization fairs.</p>
          </figcaption></figure></li>
        </ol>
      </div>
      <div class="uwg-c-photo-carousel__controls"><button type="button" class="uwg-c-photo-carousel__button" data-uwg-photo-carousel-prev="" aria-label="Show previous slide"><span aria-hidden="true">&lt;</span></button><p class="uwg-c-photo-carousel__status" data-uwg-photo-carousel-status="" aria-live="polite">Slide 1 of 3</p><button type="button" class="uwg-c-photo-carousel__button" data-uwg-photo-carousel-next="" aria-label="Show next slide"><span aria-hidden="true">&gt;</span></button></div>
      <div class="uwg-c-photo-carousel__dots" aria-label="Choose slide"><button type="button" data-uwg-photo-carousel-dot="" aria-label="Show slide 1" aria-current="true"><span class="uwg-c-photo-carousel__sr-only">Slide 1</span></button><button type="button" data-uwg-photo-carousel-dot="" aria-label="Show slide 2"><span class="uwg-c-photo-carousel__sr-only">Slide 2</span></button><button type="button" data-uwg-photo-carousel-dot="" aria-label="Show slide 3"><span class="uwg-c-photo-carousel__sr-only">Slide 3</span></button></div></section>
    
  </body>
</html>
