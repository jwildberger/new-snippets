<html lang="en">
  <head>
    <META http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Photo Carousel Snippet Table Example</title>
    <link rel="stylesheet" href="photo-carousel.css">
    <script src="photo-carousel.js" defer></script>
  </head>
  <body>
    <h1>Photo Carousel Snippet Table Example</h1>
    <section class="uwg-c-photo-carousel" data-uwg-photo-carousel="" aria-roledescription="carousel" aria-label="Campus scenes photo gallery"><div class="uwg-c-photo-carousel__viewport">
        <ol class="uwg-c-photo-carousel__slides">
          <li class="uwg-c-photo-carousel__slide" data-uwg-photo-carousel-slide="" aria-hidden="false"><figure class="uwg-c-photo-carousel__figure"><img src="campus-green.svg" alt="Students walking across a green campus lawn" width="1200" height="675" class="uwg-c-photo-carousel__image"><figcaption class="uwg-c-photo-carousel__caption">
            <p>Students cross the campus green between morning classes.</p>
          </figcaption></figure></li>
          <li class="uwg-c-photo-carousel__slide" data-uwg-photo-carousel-slide="" aria-hidden="true" hidden="hidden"><figure class="uwg-c-photo-carousel__figure"><img src="library-steps.svg" alt="A campus library entrance with broad steps and banners" width="1200" height="675" loading="lazy" class="uwg-c-photo-carousel__image"><figcaption class="uwg-c-photo-carousel__caption">
            <p>The library entrance provides a central meeting place for study groups.</p>
          </figcaption></figure></li>
          <li class="uwg-c-photo-carousel__slide" data-uwg-photo-carousel-slide="" aria-hidden="true" hidden="hidden"><figure class="uwg-c-photo-carousel__figure"><img src="student-center.svg" alt="Students gathered outside a bright student center" width="1200" height="675" loading="lazy" class="uwg-c-photo-carousel__image"><figcaption class="uwg-c-photo-carousel__caption">
            <p>The <strong>student center</strong> hosts events, dining, and organization fairs.</p>
          </figcaption></figure></li>
        </ol>
      </div>
      <div class="uwg-c-photo-carousel__controls"><button class="uwg-c-photo-carousel__button" type="button" data-uwg-photo-carousel-prev=""><span aria-hidden="true">&lt;</span><span class="uwg-c-photo-carousel__sr-only">Previous slide</span></button><p class="uwg-c-photo-carousel__status" data-uwg-photo-carousel-status="" aria-live="polite" aria-atomic="true">Slide 1 of 3</p><button class="uwg-c-photo-carousel__button" type="button" data-uwg-photo-carousel-next=""><span aria-hidden="true">&gt;</span><span class="uwg-c-photo-carousel__sr-only">Next slide</span></button></div>
      <div class="uwg-c-photo-carousel__dots" role="group" aria-label="Choose slide"><button type="button" data-uwg-photo-carousel-dot="" aria-label="Show slide 1" aria-current="true"></button><button type="button" data-uwg-photo-carousel-dot="" aria-label="Show slide 2"></button><button type="button" data-uwg-photo-carousel-dot="" aria-label="Show slide 3"></button></div></section>
    
  </body>
</html>
